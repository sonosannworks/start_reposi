<!DOCTYPE html>
<html lang="ja">
<head>
  <script src="../redirect-to-vercel.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>増える数字スワイプ - 脳トレゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#EAF4FB;
    --bg-bottom:#D7E9F7;
    --card:#FFFFFF;
    --navy:#1F3A5F;
    --navy-soft:#5C7693;
    --blue:#3B82F6;
    --green:#2BAE66;
    --red:#E74C3C;
    --yellow:#E8B400;
    --chip-bg:#F3F8FD;
    --shadow:0 12px 30px rgba(31,58,95,0.12);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:"M PLUS Rounded 1c", sans-serif;
    background:linear-gradient(160deg,var(--bg-top),var(--bg-bottom));
    color:var(--navy);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  #app{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    width:100%;
    max-width:400px;
    background:var(--card);
    border-radius:32px;
    box-shadow:var(--shadow);
    padding:30px 22px 28px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:10px;
    background:linear-gradient(90deg,var(--blue) 0 33%,var(--green) 33% 66%,var(--yellow) 66% 100%);
  }
  h1{
    font-size:24px;
    font-weight:900;
    margin:6px 0 4px;
  }
  .sub{
    font-size:14px;
    color:var(--navy-soft);
    margin:0 0 20px;
    line-height:1.7;
  }
  .rule-box{
    background:var(--chip-bg);
    border-radius:18px;
    padding:16px 18px;
    margin-bottom:22px;
    text-align:left;
    font-size:14px;
    line-height:1.8;
  }
  .rule-box b{color:var(--blue);}
  .btn{
    border:none;
    border-radius:20px;
    font-family:inherit;
    font-weight:700;
    cursor:pointer;
    transition:transform .08s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-start{
    width:100%;
    padding:20px 0;
    font-size:22px;
    color:#fff;
    background:linear-gradient(135deg,var(--blue),#2563EB);
    box-shadow:0 10px 22px rgba(59,130,246,0.35);
  }
  /* ---- game screen ---- */
  #screen-game{ position:relative; }
  .hud{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:12px;
  }
  .hud-item{ text-align:left; }
  .hud-item.right{ text-align:right; }
  .hud-label{
    font-size:12px;
    color:var(--navy-soft);
    font-weight:700;
  }
  .hud-val{
    font-size:20px;
    font-weight:900;
    line-height:1.2;
  }
  .timebar-wrap{
    height:10px;
    background:#E7EEF6;
    border-radius:6px;
    overflow:hidden;
    margin-bottom:16px;
  }
  .timebar{
    height:100%;
    background:linear-gradient(90deg,var(--green),var(--yellow));
    width:100%;
    transition:width .25s linear;
  }
  .play-area{
    position:relative;
    width:100%;
    height:320px;
    background:var(--chip-bg);
    border-radius:20px;
    overflow:hidden;
    touch-action:none;
  }
  .flash{
    position:absolute;
    inset:0;
    opacity:0;
    pointer-events:none;
    z-index:5;
  }
  .flash.show-ok{ background:rgba(43,174,102,0.28); opacity:1; transition:opacity .15s; }
  .line-svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }
  .num-node{
    position:absolute;
    width:56px;
    height:56px;
    border-radius:50%;
    background:#fff;
    border:3px solid var(--blue);
    color:var(--navy);
    font-size:21px;
    font-weight:900;
    display:flex;
    align-items:center;
    justify-content:center;
    transform:translate(-50%,-50%);
    box-shadow:0 4px 10px rgba(31,58,95,0.15);
    user-select:none;
  }
  .num-node.connected{
    border-color:var(--green);
    background:#EAFBF1;
    color:var(--green);
  }
  .num-node.next-target{
    box-shadow:0 0 0 5px rgba(232,180,0,0.35);
    animation:pulse 1s infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 4px rgba(232,180,0,0.3); }
    50%{ box-shadow:0 0 0 9px rgba(232,180,0,0.12); }
  }
  .overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.97);
    border-radius:32px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  .overlay.show{ opacity:1; pointer-events:all; }
  .overlay .ov-title{
    font-size:34px;
    font-weight:900;
    color:var(--navy);
    margin-bottom:8px;
  }
  .overlay .ov-sub{
    font-size:14px;
    color:var(--navy-soft);
  }
  /* ---- result screen ---- */
  .result-score{
    font-size:54px;
    font-weight:900;
    color:var(--blue);
    margin:6px 0 0;
  }
  .result-label{
    font-size:14px;
    color:var(--navy-soft);
    margin-bottom:20px;
  }
  .stat-row{
    display:flex;
    justify-content:space-around;
    margin-bottom:24px;
  }
  .stat{ text-align:center; }
  .stat .num{ font-size:23px; font-weight:900; }
  .stat .num.ok{ color:var(--green); }
  .stat .lab{ font-size:12px; color:var(--navy-soft); margin-top:2px; }
  .hidden{ display:none !important; }
  /* ---- dementia eval ---- */
  .dementia-eval{background:var(--chip-bg);border-radius:18px;padding:14px 16px;margin-bottom:20px;}
  .eval-title{font-size:11px;font-weight:700;color:var(--navy-soft);letter-spacing:.08em;margin-bottom:10px;text-align:center;}
  .eval-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
  .eval-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
  .eval-dot.low{background:var(--green);}
  .eval-dot.mid{background:var(--yellow);}
  .eval-dot.high{background:var(--red);}
  .eval-level{font-size:19px;font-weight:900;}
  .eval-level.low{color:var(--green);}
  .eval-level.mid{color:var(--yellow);}
  .eval-level.high{color:var(--red);}
  .eval-msg{font-size:12px;color:var(--navy);line-height:1.65;text-align:center;margin-bottom:6px;}
  .eval-note{font-size:10px;color:var(--navy-soft);line-height:1.5;text-align:center;}
</style>
</head>
<body>
<div id="app">

  <!-- スタート画面 -->
  <div class="card" id="screen-start">
    <h1>増える数字スワイプ</h1>
    <p class="sub">1から6まで、指を離さずに<br>小さい順になぞってつなごう！</p>
    <div class="rule-box">
      <b>1</b>の数字から指を置いて、<br>
      指を離さずに<b>2→3→4→5→6</b>の順に<br>
      なぞってつないでください。<br>
      途中で指を離すと最初からやり直しです。<br>
      60秒間で何セットクリアできるかな？
    </div>
    <button class="btn btn-start" id="btn-start">スタート</button>
  </div>

  <!-- ゲーム画面 -->
  <div class="card hidden" id="screen-game">
    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">残り時間</div>
        <div class="hud-val"><span id="time-val">60</span>秒</div>
      </div>
      <div class="hud-item right">
        <div class="hud-label">クリアセット</div>
        <div class="hud-val"><span id="sets-val">0</span></div>
      </div>
    </div>
    <div class="timebar-wrap"><div class="timebar" id="timebar"></div></div>
    <div class="play-area" id="play-area">
      <svg class="line-svg" id="line-svg"></svg>
      <div class="flash" id="flash"></div>
    </div>

    <div class="overlay" id="overlay-timeup">
      <div class="ov-title">タイムアップ！</div>
      <div class="ov-sub">結果を集計しています…</div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="card hidden" id="screen-result">
    <h1>タイムアップ！</h1>
    <div class="result-score" id="final-score">0</div>
    <div class="result-label">点</div>
    <div class="stat-row">
      <div class="stat"><div class="num ok" id="final-sets">0</div><div class="lab">クリアセット数</div></div>
      <div class="stat"><div class="num" id="final-progress">0/6</div><div class="lab">最後の進行</div></div>
    </div>
    <div class="dementia-eval">
      <div class="eval-title">認知症リスク評価（参考）</div>
      <div class="eval-row">
        <div class="eval-dot" id="eval-dot"></div>
        <div class="eval-level" id="eval-level">-</div>
      </div>
      <div class="eval-msg" id="eval-msg"></div>
      <div class="eval-note">※ゲームの成績に基づく参考値です。医療的診断ではありません。</div>
    </div>
    <button class="btn btn-start" id="btn-retry">もう一度プレイ</button>
  </div>

</div>

<script>
(function(){
  var SET_SIZE = 6;
  var GAME_SECONDS = 60;
  var COLS = 3, ROWS = 2; // 3*2 = 6 cells
  var NODE_RADIUS = 32; // ヒット判定の半径(px)

  var screenStart = document.getElementById('screen-start');
  var screenGame = document.getElementById('screen-game');
  var screenResult = document.getElementById('screen-result');

  var playArea = document.getElementById('play-area');
  var lineSvg = document.getElementById('line-svg');
  var flashEl = document.getElementById('flash');
  var timeVal = document.getElementById('time-val');
  var setsVal = document.getElementById('sets-val');
  var timebar = document.getElementById('timebar');
  var overlayTimeup = document.getElementById('overlay-timeup');

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');

  var timeLeft, timer, setsCleared, gameEnded, nodes, nextExpected, dragging, lastConnected, tempLine;

  function shuffle(arr){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function clearSvg(){
    lineSvg.innerHTML = '';
    tempLine = null;
  }

  function layoutNewSet(){
    playArea.querySelectorAll('.num-node').forEach(function(n){ n.remove(); });
    clearSvg();
    nodes = [];
    nextExpected = 1;
    dragging = false;
    lastConnected = null;

    var w = playArea.clientWidth;
    var h = playArea.clientHeight;
    var cellW = w / COLS;
    var cellH = h / ROWS;
    var cellIndexes = shuffle([...Array(COLS * ROWS).keys()]);

    for (var n = 1; n <= SET_SIZE; n++){
      var idx = cellIndexes[n - 1];
      var col = idx % COLS;
      var row = Math.floor(idx / COLS);
      var jitterX = (Math.random() - 0.5) * (cellW * 0.35);
      var jitterY = (Math.random() - 0.5) * (cellH * 0.35);
      var cx = col * cellW + cellW / 2 + jitterX;
      var cy = row * cellH + cellH / 2 + jitterY;
      cx = Math.max(32, Math.min(w - 32, cx));
      cy = Math.max(32, Math.min(h - 32, cy));

      var el = document.createElement('div');
      el.className = 'num-node';
      el.textContent = n;
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      playArea.appendChild(el);

      nodes.push({ value:n, cx:cx, cy:cy, el:el });
    }
    highlightNext();
  }

  function highlightNext(){
    nodes.forEach(function(node){ node.el.classList.remove('next-target'); });
    var target = nodes.find(function(n){ return n.value === nextExpected; });
    if (target) target.el.classList.add('next-target');
  }

  function findNodeAt(x, y, value){
    return nodes.find(function(n){
      if (value !== undefined && n.value !== value) return false;
      var dx = n.cx - x, dy = n.cy - y;
      return Math.sqrt(dx*dx + dy*dy) <= NODE_RADIUS;
    });
  }

  function addPermanentLine(a, b){
    var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.cx); line.setAttribute('y1', a.cy);
    line.setAttribute('x2', b.cx); line.setAttribute('y2', b.cy);
    line.setAttribute('stroke', '#2BAE66');
    line.setAttribute('stroke-width', '5');
    line.setAttribute('stroke-linecap', 'round');
    lineSvg.appendChild(line);
  }

  function updateTempLine(x, y){
    if (!lastConnected) return;
    if (!tempLine){
      tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      tempLine.setAttribute('stroke', '#3B82F6');
      tempLine.setAttribute('stroke-width', '4');
      tempLine.setAttribute('stroke-dasharray', '6,5');
      tempLine.setAttribute('stroke-linecap', 'round');
      lineSvg.appendChild(tempLine);
    }
    tempLine.setAttribute('x1', lastConnected.cx);
    tempLine.setAttribute('y1', lastConnected.cy);
    tempLine.setAttribute('x2', x);
    tempLine.setAttribute('y2', y);
  }

  function removeTempLine(){
    if (tempLine && tempLine.parentNode){ tempLine.parentNode.removeChild(tempLine); }
    tempLine = null;
  }

  function relPos(e){
    var rect = playArea.getBoundingClientRect();
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function resetProgress(){
    nodes.forEach(function(n){ n.el.classList.remove('connected'); });
    clearSvg();
    nextExpected = 1;
    dragging = false;
    lastConnected = null;
    highlightNext();
  }

  function completeSet(){
    setsCleared++;
    setsVal.textContent = setsCleared;
    flashEl.className = 'flash show-ok';
    dragging = false;
    setTimeout(function(){
      flashEl.className = 'flash';
      if (!gameEnded) layoutNewSet();
    }, 350);
  }

  function onDown(e){
    if (gameEnded) return;
    var p = relPos(e);
    var hit = findNodeAt(p.x, p.y, 1);
    if (nextExpected === 1 && hit){
      dragging = true;
      hit.el.classList.add('connected');
      lastConnected = hit;
      nextExpected = 2;
      highlightNext();
    }
  }

  function onMove(e){
    if (!dragging) return;
    var p = relPos(e);
    updateTempLine(p.x, p.y);
    if (nextExpected > SET_SIZE) return;
    var hit = findNodeAt(p.x, p.y, nextExpected);
    if (hit){
      addPermanentLine(lastConnected, hit);
      hit.el.classList.add('connected');
      lastConnected = hit;
      nextExpected++;
      highlightNext();
      if (nextExpected > SET_SIZE){
        removeTempLine();
        completeSet();
      }
    }
  }

  function onUp(){
    if (!dragging) return;
    dragging = false;
    removeTempLine();
    if (nextExpected <= SET_SIZE){
      // 未完成のままリリース → やり直し
      resetProgress();
    }
  }

  playArea.addEventListener('pointerdown', onDown);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  playArea.addEventListener('touchstart', onDown, {passive:true});
  window.addEventListener('touchmove', onMove, {passive:true});
  window.addEventListener('touchend', onUp);

  function startGame(){
    timeLeft = GAME_SECONDS;
    setsCleared = 0;
    gameEnded = false;

    timeVal.textContent = timeLeft;
    setsVal.textContent = setsCleared;
    timebar.style.width = '100%';
    overlayTimeup.classList.remove('show');

    screenStart.classList.add('hidden');
    screenResult.classList.add('hidden');
    screenGame.classList.remove('hidden');

    requestAnimationFrame(function(){ layoutNewSet(); });

    clearInterval(timer);
    timer = setInterval(function(){
      timeLeft -= 1;
      timeVal.textContent = Math.max(timeLeft, 0);
      timebar.style.width = (Math.max(timeLeft, 0) / GAME_SECONDS * 100) + '%';
      if (timeLeft <= 0){
        clearInterval(timer);
        timeUpSequence();
      }
    }, 1000);
  }

  function timeUpSequence(){
    gameEnded = true;
    dragging = false;
    overlayTimeup.classList.add('show');
    setTimeout(function(){ endGame(); }, 2500);
  }

  function endGame(){
    overlayTimeup.classList.remove('show');
    screenGame.classList.add('hidden');
    screenResult.classList.remove('hidden');

    var progress = Math.max(0, nextExpected - 1);
    var score = setsCleared * 15 + progress * 3;

    document.getElementById('final-score').textContent = score;
    document.getElementById('final-sets').textContent = setsCleared;
    document.getElementById('final-progress').textContent = progress + '/' + SET_SIZE;
    var dotEl = document.getElementById('eval-dot');
    var levelEl = document.getElementById('eval-level');
    var msgEl = document.getElementById('eval-msg');
    if (setsCleared >= 4){
      dotEl.className = 'eval-dot low'; levelEl.className = 'eval-level low';
      levelEl.textContent = '認知症リスク 低';
      msgEl.textContent = '視覚追跡・運動制御が高い水準です。この調子で脳トレを続けましょう！';
    } else if (setsCleared >= 1){
      dotEl.className = 'eval-dot mid'; levelEl.className = 'eval-level mid';
      levelEl.textContent = '認知症リスク 中';
      msgEl.textContent = '引き続き脳トレを続けて、認知機能を維持しましょう。';
    } else {
      dotEl.className = 'eval-dot high'; levelEl.className = 'eval-level high';
      levelEl.textContent = '認知症リスク 高';
      msgEl.textContent = '積極的に脳トレに取り組みましょう。気になる場合は専門家にご相談ください。';
    }
  }

  btnStart.addEventListener('click', startGame);
  btnRetry.addEventListener('click', startGame);
})();
</script>
</body>
</html>
