<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>左右スワイプ判定 - 脳トレゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#EAF4FB;
    --bg-bottom:#D7E9F7;
    --card:#FFFFFF;
    --navy:#1F3A5F;
    --navy-soft:#5C7693;
    --blue:#3B82F6;
    --green:#2BAE66;
    --red:#E74C3C;
    --yellow:#E8B400;
    --chip-bg:#F3F8FD;
    --shadow:0 12px 30px rgba(31,58,95,0.12);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:"M PLUS Rounded 1c", sans-serif;
    background:linear-gradient(160deg,var(--bg-top),var(--bg-bottom));
    color:var(--navy);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  #app{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    width:100%;
    max-width:400px;
    background:var(--card);
    border-radius:32px;
    box-shadow:var(--shadow);
    padding:30px 22px 28px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:10px;
    background:linear-gradient(90deg,var(--red) 0 50%,var(--green) 50% 100%);
  }
  h1{
    font-size:25px;
    font-weight:900;
    margin:6px 0 4px;
  }
  .sub{
    font-size:14px;
    color:var(--navy-soft);
    margin:0 0 20px;
    line-height:1.7;
  }
  .rule-box{
    background:var(--chip-bg);
    border-radius:18px;
    padding:16px 18px;
    margin-bottom:22px;
    text-align:left;
    font-size:14px;
    line-height:1.8;
  }
  .rule-box b.veg{color:var(--red);}
  .rule-box b.fruit{color:var(--green);}
  .btn{
    border:none;
    border-radius:20px;
    font-family:inherit;
    font-weight:700;
    cursor:pointer;
    transition:transform .08s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-start{
    width:100%;
    padding:20px 0;
    font-size:22px;
    color:#fff;
    background:linear-gradient(135deg,var(--blue),#2563EB);
    box-shadow:0 10px 22px rgba(59,130,246,0.35);
  }
  /* ---- game screen ---- */
  #screen-game{ position:relative; }
  .hud{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:12px;
  }
  .hud-item{ text-align:left; }
  .hud-item.right{ text-align:right; }
  .hud-label{
    font-size:12px;
    color:var(--navy-soft);
    font-weight:700;
  }
  .hud-val{
    font-size:20px;
    font-weight:900;
    line-height:1.2;
  }
  .timebar-wrap{
    height:10px;
    background:#E7EEF6;
    border-radius:6px;
    overflow:hidden;
    margin-bottom:14px;
  }
  .timebar{
    height:100%;
    background:linear-gradient(90deg,var(--green),var(--yellow));
    width:100%;
    transition:width .25s linear;
  }
  .legend{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    font-weight:700;
    margin-bottom:10px;
  }
  .legend .veg{ color:var(--red); }
  .legend .fruit{ color:var(--green); }
  .swipe-stage{
    position:relative;
    height:190px;
    margin-bottom:18px;
  }
  .hintzone{
    position:absolute;
    top:0; bottom:0;
    width:30%;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:18px;
    font-size:15px;
    font-weight:900;
    opacity:.25;
    transition:opacity .1s;
    pointer-events:none;
  }
  .hintzone.left{ left:0; background:#FDEDEB; color:var(--red); }
  .hintzone.right{ right:0; background:#E9F8EF; color:var(--green); }
  .swipe-card{
    position:absolute;
    top:0; left:50%;
    width:62%;
    height:100%;
    background:#fff;
    border:2.5px solid var(--chip-bg);
    border-radius:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:900;
    color:var(--navy);
    box-shadow:0 8px 18px rgba(31,58,95,0.15);
    transform:translate(-50%,0);
    touch-action:none;
    cursor:grab;
    user-select:none;
  }
  .swipe-card.dragging{ transition:none; }
  .swipe-card.snap{ transition:transform .25s ease; }
  .swipe-card.fly{ transition:transform .2s ease, opacity .2s ease; }
  .arrow-row{
    display:flex;
    gap:14px;
  }
  .arrow-btn{
    flex:1;
    padding:18px 0;
    font-size:16px;
    border-radius:18px;
    color:#fff;
  }
  .arrow-btn.veg{ background:linear-gradient(135deg,#F0685A,var(--red)); box-shadow:0 8px 16px rgba(231,76,60,0.3); }
  .arrow-btn.fruit{ background:linear-gradient(135deg,#34C77B,var(--green)); box-shadow:0 8px 16px rgba(43,174,102,0.3); }
  .overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.97);
    border-radius:32px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  .overlay.show{ opacity:1; pointer-events:all; }
  .overlay .ov-title{
    font-size:34px;
    font-weight:900;
    color:var(--navy);
    margin-bottom:8px;
  }
  .overlay .ov-sub{
    font-size:14px;
    color:var(--navy-soft);
  }
  /* ---- result screen ---- */
  .result-score{
    font-size:54px;
    font-weight:900;
    color:var(--blue);
    margin:6px 0 0;
  }
  .result-label{
    font-size:14px;
    color:var(--navy-soft);
    margin-bottom:20px;
  }
  .stat-row{
    display:flex;
    justify-content:space-around;
    margin-bottom:24px;
  }
  .stat{ text-align:center; }
  .stat .num{ font-size:23px; font-weight:900; }
  .stat .num.ok{ color:var(--green); }
  .stat .num.ng{ color:var(--red); }
  .stat .lab{ font-size:12px; color:var(--navy-soft); margin-top:2px; }
  .hidden{ display:none !important; }
  /* ---- dementia eval ---- */
  .dementia-eval{background:var(--chip-bg);border-radius:18px;padding:14px 16px;margin-bottom:20px;}
  .eval-title{font-size:11px;font-weight:700;color:var(--navy-soft);letter-spacing:.08em;margin-bottom:10px;text-align:center;}
  .eval-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
  .eval-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
  .eval-dot.low{background:var(--green);}
  .eval-dot.mid{background:var(--yellow);}
  .eval-dot.high{background:var(--red);}
  .eval-level{font-size:19px;font-weight:900;}
  .eval-level.low{color:var(--green);}
  .eval-level.mid{color:var(--yellow);}
  .eval-level.high{color:var(--red);}
  .eval-msg{font-size:12px;color:var(--navy);line-height:1.65;text-align:center;margin-bottom:6px;}
  .eval-note{font-size:10px;color:var(--navy-soft);line-height:1.5;text-align:center;}
</style>
</head>
<body>
<div id="app">

  <!-- スタート画面 -->
  <div class="card" id="screen-start">
    <h1>左右スワイプ判定</h1>
    <p class="sub">表示された言葉を見て<br>すばやく正しい方向へスワイプ！</p>
    <div class="rule-box">
      <b class="fruit">くだもの</b>なら右にスワイプ →<br>
      <b class="veg">やさい</b>なら左にスワイプ ←<br><br>
      ボタンタップでも回答できます。<br>
      30秒間でできるだけ多く正解しよう！
    </div>
    <button class="btn btn-start" id="btn-start">スタート</button>
  </div>

  <!-- ゲーム画面 -->
  <div class="card hidden" id="screen-game">
    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">残り時間</div>
        <div class="hud-val"><span id="time-val">30</span>秒</div>
      </div>
      <div class="hud-item right">
        <div class="hud-label">得点</div>
        <div class="hud-val" id="score-val">0</div>
      </div>
    </div>
    <div class="timebar-wrap"><div class="timebar" id="timebar"></div></div>
    <div class="legend">
      <span class="veg">← やさい</span>
      <span class="fruit">くだもの →</span>
    </div>
    <div class="swipe-stage" id="swipe-stage">
      <div class="hintzone left" id="hint-left">← やさい</div>
      <div class="hintzone right" id="hint-right">くだもの →</div>
      <div class="swipe-card" id="swipe-card">りんご</div>
    </div>
    <div class="arrow-row">
      <button class="btn arrow-btn veg" id="btn-veg">← やさい</button>
      <button class="btn arrow-btn fruit" id="btn-fruit">くだもの →</button>
    </div>

    <div class="overlay" id="overlay-timeup">
      <div class="ov-title">タイムアップ！</div>
      <div class="ov-sub">結果を集計しています…</div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="card hidden" id="screen-result">
    <h1>タイムアップ！</h1>
    <div class="result-score" id="final-score">0</div>
    <div class="result-label">点</div>
    <div class="stat-row">
      <div class="stat"><div class="num ok" id="final-ok">0</div><div class="lab">正解</div></div>
      <div class="stat"><div class="num ng" id="final-ng">0</div><div class="lab">間違い</div></div>
      <div class="stat"><div class="num" id="final-rate">0%</div><div class="lab">正解率</div></div>
    </div>
    <div class="dementia-eval">
      <div class="eval-title">認知症リスク評価（参考）</div>
      <div class="eval-row">
        <div class="eval-dot" id="eval-dot"></div>
        <div class="eval-level" id="eval-level">-</div>
      </div>
      <div class="eval-msg" id="eval-msg"></div>
      <div class="eval-note">※ゲームの成績に基づく参考値です。医療的診断ではありません。</div>
    </div>
    <button class="btn btn-start" id="btn-retry">もう一度プレイ</button>
  </div>

</div>

<script>
(function(){
  var FRUITS = ["りんご","ばなな","みかん","ぶどう","いちご","もも","なし","すいか","めろん","きうい"];
  var VEGGIES = ["にんじん","だいこん","たまねぎ","じゃがいも","きゅうり","なす","ほうれんそう","かぼちゃ","ねぎ","ぴーまん"];
  var GAME_SECONDS = 30;
  var SWIPE_THRESHOLD = 70;

  var screenStart = document.getElementById('screen-start');
  var screenGame = document.getElementById('screen-game');
  var screenResult = document.getElementById('screen-result');

  var swipeStage = document.getElementById('swipe-stage');
  var swipeCard = document.getElementById('swipe-card');
  var hintLeft = document.getElementById('hint-left');
  var hintRight = document.getElementById('hint-right');
  var timeVal = document.getElementById('time-val');
  var scoreVal = document.getElementById('score-val');
  var timebar = document.getElementById('timebar');
  var overlayTimeup = document.getElementById('overlay-timeup');

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');
  var btnVeg = document.getElementById('btn-veg');
  var btnFruit = document.getElementById('btn-fruit');

  var score, correctCount, wrongCount, timeLeft, timer, currentCategory, gameEnded, locked;
  var dragging, startX, deltaX;

  function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

  function newWord(){
    if (gameEnded) return;
    locked = false;
    swipeCard.classList.remove('fly');
    swipeCard.classList.add('snap');
    swipeCard.style.transform = 'translate(-50%,0) rotate(0deg)';
    swipeCard.style.opacity = '1';
    hintLeft.style.opacity = '.25';
    hintRight.style.opacity = '.25';

    if (Math.random() < 0.5){
      currentCategory = 'fruit';
      swipeCard.textContent = pick(FRUITS);
    } else {
      currentCategory = 'veg';
      swipeCard.textContent = pick(VEGGIES);
    }
  }

  function judge(direction){
    if (gameEnded || locked) return;
    locked = true;
    var userSaysFruit = (direction === 'right');
    var correct = (userSaysFruit && currentCategory === 'fruit') || (!userSaysFruit && currentCategory === 'veg');

    if (correct){
      score += 1; correctCount += 1;
    } else {
      score = Math.max(0, score - 1); wrongCount += 1;
    }
    scoreVal.textContent = score;

    var flyX = direction === 'right' ? 420 : -420;
    swipeCard.classList.remove('dragging');
    swipeCard.classList.add('fly');
    swipeCard.classList.remove('snap');
    swipeCard.style.transform = 'translate(' + (flyX - swipeCard.offsetWidth/2) + 'px,0) rotate(' + (direction === 'right' ? 18 : -18) + 'deg)';
    swipeCard.style.opacity = '0';

    setTimeout(function(){ newWord(); }, 220);
  }

  function onPointerDown(e){
    if (gameEnded || locked) return;
    dragging = true;
    startX = (e.touches ? e.touches[0].clientX : e.clientX);
    deltaX = 0;
    swipeCard.classList.remove('snap', 'fly');
    swipeCard.classList.add('dragging');
  }
  function onPointerMove(e){
    if (!dragging) return;
    var x = (e.touches ? e.touches[0].clientX : e.clientX);
    deltaX = x - startX;
    swipeCard.style.transform = 'translate(calc(-50% + ' + deltaX + 'px),0) rotate(' + (deltaX / 18) + 'deg)';
    var ratio = Math.max(0, Math.min(1, Math.abs(deltaX) / SWIPE_THRESHOLD));
    if (deltaX > 0){
      hintRight.style.opacity = (0.25 + ratio * 0.65).toFixed(2);
      hintLeft.style.opacity = '.25';
    } else if (deltaX < 0){
      hintLeft.style.opacity = (0.25 + ratio * 0.65).toFixed(2);
      hintRight.style.opacity = '.25';
    }
  }
  function onPointerUp(){
    if (!dragging) return;
    dragging = false;
    swipeCard.classList.remove('dragging');
    if (Math.abs(deltaX) > SWIPE_THRESHOLD){
      judge(deltaX > 0 ? 'right' : 'left');
    } else {
      swipeCard.classList.add('snap');
      swipeCard.style.transform = 'translate(-50%,0) rotate(0deg)';
      hintLeft.style.opacity = '.25';
      hintRight.style.opacity = '.25';
    }
  }

  swipeCard.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  swipeCard.addEventListener('touchstart', onPointerDown, {passive:true});
  window.addEventListener('touchmove', onPointerMove, {passive:true});
  window.addEventListener('touchend', onPointerUp);

  btnVeg.addEventListener('click', function(){ judge('left'); });
  btnFruit.addEventListener('click', function(){ judge('right'); });

  function startGame(){
    score = 0; correctCount = 0; wrongCount = 0; timeLeft = GAME_SECONDS;
    gameEnded = false; locked = false;
    scoreVal.textContent = 0;
    timeVal.textContent = timeLeft;
    timebar.style.width = '100%';
    overlayTimeup.classList.remove('show');

    screenStart.classList.add('hidden');
    screenResult.classList.add('hidden');
    screenGame.classList.remove('hidden');

    newWord();

    clearInterval(timer);
    timer = setInterval(function(){
      timeLeft -= 1;
      timeVal.textContent = Math.max(timeLeft, 0);
      timebar.style.width = (Math.max(timeLeft, 0) / GAME_SECONDS * 100) + '%';
      if (timeLeft <= 0){
        clearInterval(timer);
        timeUpSequence();
      }
    }, 1000);
  }

  function timeUpSequence(){
    gameEnded = true;
    locked = true;
    overlayTimeup.classList.add('show');
    setTimeout(function(){ endGame(); }, 2500);
  }

  function endGame(){
    overlayTimeup.classList.remove('show');
    screenGame.classList.add('hidden');
    screenResult.classList.remove('hidden');
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-ok').textContent = correctCount;
    document.getElementById('final-ng').textContent = wrongCount;
    var total = correctCount + wrongCount;
    var rate = total > 0 ? Math.round(correctCount / total * 100) : 0;
    document.getElementById('final-rate').textContent = rate + '%';
    var dotEl = document.getElementById('eval-dot');
    var levelEl = document.getElementById('eval-level');
    var msgEl = document.getElementById('eval-msg');
    if (rate >= 80){
      dotEl.className = 'eval-dot low'; levelEl.className = 'eval-level low';
      levelEl.textContent = '認知症リスク 低';
      msgEl.textContent = '判断速度・反応力が高い水準です。この調子で脳トレを続けましょう！';
    } else if (rate >= 60){
      dotEl.className = 'eval-dot mid'; levelEl.className = 'eval-level mid';
      levelEl.textContent = '認知症リスク 中';
      msgEl.textContent = '引き続き脳トレを続けて、認知機能を維持しましょう。';
    } else {
      dotEl.className = 'eval-dot high'; levelEl.className = 'eval-level high';
      levelEl.textContent = '認知症リスク 高';
      msgEl.textContent = '積極的に脳トレに取り組みましょう。気になる場合は専門家にご相談ください。';
    }
  }

  btnStart.addEventListener('click', startGame);
  btnRetry.addEventListener('click', startGame);
})();
</script>
</body>
</html>
