<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>矢印逆方向タップ - 脳トレゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#EAF4FB;
    --bg-bottom:#D7E9F7;
    --card:#FFFFFF;
    --navy:#1F3A5F;
    --navy-soft:#5C7693;
    --blue:#3B82F6;
    --green:#2BAE66;
    --red:#E74C3C;
    --yellow:#E8B400;
    --chip-bg:#F3F8FD;
    --shadow:0 12px 30px rgba(31,58,95,0.12);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:"M PLUS Rounded 1c", sans-serif;
    background:linear-gradient(160deg,var(--bg-top),var(--bg-bottom));
    color:var(--navy);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  #app{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    width:100%;
    max-width:400px;
    background:var(--card);
    border-radius:32px;
    box-shadow:var(--shadow);
    padding:30px 22px 28px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:10px;
    background:linear-gradient(90deg,var(--blue) 0 33%,var(--green) 33% 66%,var(--yellow) 66% 100%);
  }
  h1{
    font-size:25px;
    font-weight:900;
    margin:6px 0 4px;
  }
  .sub{
    font-size:14px;
    color:var(--navy-soft);
    margin:0 0 20px;
    line-height:1.7;
  }
  .rule-box{
    background:var(--chip-bg);
    border-radius:18px;
    padding:16px 18px;
    margin-bottom:22px;
    text-align:left;
    font-size:14px;
    line-height:1.8;
  }
  .rule-box b{color:var(--blue);}
  .btn{
    border:none;
    border-radius:20px;
    font-family:inherit;
    font-weight:700;
    cursor:pointer;
    transition:transform .08s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-start{
    width:100%;
    padding:20px 0;
    font-size:22px;
    color:#fff;
    background:linear-gradient(135deg,var(--blue),#2563EB);
    box-shadow:0 10px 22px rgba(59,130,246,0.35);
  }
  /* ---- game screen ---- */
  #screen-game{ position:relative; }
  .hud{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:14px;
  }
  .hud-item{ text-align:left; }
  .hud-item.right{ text-align:right; }
  .hud-label{
    font-size:12px;
    color:var(--navy-soft);
    font-weight:700;
  }
  .hud-val{
    font-size:20px;
    font-weight:900;
    line-height:1.2;
  }
  .timebar-wrap{
    height:10px;
    background:#E7EEF6;
    border-radius:6px;
    overflow:hidden;
    margin-bottom:18px;
  }
  .timebar{
    height:100%;
    background:linear-gradient(90deg,var(--green),var(--yellow));
    width:100%;
    transition:width .25s linear;
  }
  .arrow-stage{
    height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:8px;
    border-radius:20px;
    background:var(--chip-bg);
    position:relative;
    overflow:hidden;
  }
  .flash{
    position:absolute;
    inset:0;
    opacity:0;
    pointer-events:none;
  }
  .flash.show-ok{ background:rgba(43,174,102,0.22); opacity:1; transition:opacity .15s; }
  .flash.show-ng{ background:rgba(231,76,60,0.22); opacity:1; transition:opacity .15s; }
  .arrow-glyph{
    font-size:64px;
    font-weight:900;
    color:var(--navy);
    line-height:1;
    transition:transform .05s;
  }
  .hint-text{
    font-size:13px;
    color:var(--navy-soft);
    margin-bottom:18px;
  }
  .dpad{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:1fr 1fr 1fr;
    gap:8px;
    max-width:230px;
    margin:0 auto;
  }
  .dpad-btn{
    aspect-ratio:1/1;
    border-radius:16px;
    background:#fff;
    border:2.5px solid var(--blue);
    color:var(--blue);
    font-size:28px;
    font-weight:900;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 10px rgba(59,130,246,0.15);
  }
  .dpad-up{ grid-column:2; grid-row:1; }
  .dpad-left{ grid-column:1; grid-row:2; }
  .dpad-center{ grid-column:2; grid-row:2; visibility:hidden; }
  .dpad-right{ grid-column:3; grid-row:2; }
  .dpad-down{ grid-column:2; grid-row:3; }
  .overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.97);
    border-radius:32px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  .overlay.show{ opacity:1; pointer-events:all; }
  .overlay .ov-title{
    font-size:34px;
    font-weight:900;
    color:var(--navy);
    margin-bottom:8px;
  }
  .overlay .ov-sub{
    font-size:14px;
    color:var(--navy-soft);
  }
  /* ---- result screen ---- */
  .result-score{
    font-size:54px;
    font-weight:900;
    color:var(--blue);
    margin:6px 0 0;
  }
  .result-label{
    font-size:14px;
    color:var(--navy-soft);
    margin-bottom:20px;
  }
  .stat-row{
    display:flex;
    justify-content:space-around;
    margin-bottom:24px;
  }
  .stat{ text-align:center; }
  .stat .num{ font-size:23px; font-weight:900; }
  .stat .num.ok{ color:var(--green); }
  .stat .num.ng{ color:var(--red); }
  .stat .lab{ font-size:12px; color:var(--navy-soft); margin-top:2px; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="app">

  <!-- スタート画面 -->
  <div class="card" id="screen-start">
    <h1>矢印逆方向タップ</h1>
    <p class="sub">矢印が向いている方向と<br><b>逆</b>のボタンをタップ！</p>
    <div class="rule-box">
      例えば矢印が<b>上向き↑</b>なら、<br>
      <b>下のボタン↓</b>をタップしてください。<br>
      頭で「逆」を考えるのがポイントです。<br>
      60秒間でできるだけ多く正解しよう！
    </div>
    <button class="btn btn-start" id="btn-start">スタート</button>
  </div>

  <!-- ゲーム画面 -->
  <div class="card hidden" id="screen-game">
    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">残り時間</div>
        <div class="hud-val"><span id="time-val">60</span>秒</div>
      </div>
      <div class="hud-item right">
        <div class="hud-label">得点</div>
        <div class="hud-val" id="score-val">0</div>
      </div>
    </div>
    <div class="timebar-wrap"><div class="timebar" id="timebar"></div></div>

    <div class="arrow-stage">
      <div class="flash" id="flash"></div>
      <div class="arrow-glyph" id="arrow-glyph">↑</div>
    </div>
    <div class="hint-text">↑ この矢印と「逆」のボタンをタップ</div>

    <div class="dpad">
      <button class="btn dpad-btn dpad-up" data-dir="up">↑</button>
      <button class="btn dpad-btn dpad-left" data-dir="left">←</button>
      <div class="dpad-btn dpad-center"></div>
      <button class="btn dpad-btn dpad-right" data-dir="right">→</button>
      <button class="btn dpad-btn dpad-down" data-dir="down">↓</button>
    </div>

    <div class="overlay" id="overlay-timeup">
      <div class="ov-title">タイムアップ！</div>
      <div class="ov-sub">結果を集計しています…</div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="card hidden" id="screen-result">
    <h1>タイムアップ！</h1>
    <div class="result-score" id="final-score">0</div>
    <div class="result-label">点</div>
    <div class="stat-row">
      <div class="stat"><div class="num ok" id="final-ok">0</div><div class="lab">正解</div></div>
      <div class="stat"><div class="num ng" id="final-ng">0</div><div class="lab">間違い</div></div>
      <div class="stat"><div class="num" id="final-rate">0%</div><div class="lab">正解率</div></div>
    </div>
    <button class="btn btn-start" id="btn-retry">もう一度プレイ</button>
  </div>

</div>

<script>
(function(){
  var GAME_SECONDS = 60;
  var DIRECTIONS = ['up','right','down','left'];
  var ROTATE = { up:0, right:90, down:180, left:270 };
  var OPPOSITE = { up:'down', down:'up', left:'right', right:'left' };

  var screenStart = document.getElementById('screen-start');
  var screenGame = document.getElementById('screen-game');
  var screenResult = document.getElementById('screen-result');

  var arrowGlyph = document.getElementById('arrow-glyph');
  var flashEl = document.getElementById('flash');
  var timeVal = document.getElementById('time-val');
  var scoreVal = document.getElementById('score-val');
  var timebar = document.getElementById('timebar');
  var overlayTimeup = document.getElementById('overlay-timeup');

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');
  var dpadBtns = document.querySelectorAll('.dpad-btn[data-dir]');

  var score, correctCount, wrongCount, timeLeft, timer, currentDir, gameEnded, locked;

  function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

  function newRound(){
    if (gameEnded) return;
    locked = false;
    flashEl.className = 'flash';
    currentDir = pick(DIRECTIONS);
    arrowGlyph.style.transform = 'rotate(' + ROTATE[currentDir] + 'deg)';
  }

  function judge(userDir){
    if (gameEnded || locked) return;
    locked = true;
    var correct = (userDir === OPPOSITE[currentDir]);
    if (correct){
      score += 1; correctCount += 1;
      flashEl.className = 'flash show-ok';
    } else {
      score = Math.max(0, score - 1); wrongCount += 1;
      flashEl.className = 'flash show-ng';
    }
    scoreVal.textContent = score;
    setTimeout(function(){ newRound(); }, 200);
  }

  dpadBtns.forEach(function(btn){
    btn.addEventListener('click', function(){ judge(btn.dataset.dir); });
  });

  function startGame(){
    score = 0; correctCount = 0; wrongCount = 0; timeLeft = GAME_SECONDS;
    gameEnded = false; locked = false;
    scoreVal.textContent = 0;
    timeVal.textContent = timeLeft;
    timebar.style.width = '100%';
    overlayTimeup.classList.remove('show');

    screenStart.classList.add('hidden');
    screenResult.classList.add('hidden');
    screenGame.classList.remove('hidden');

    newRound();

    clearInterval(timer);
    timer = setInterval(function(){
      timeLeft -= 1;
      timeVal.textContent = Math.max(timeLeft, 0);
      timebar.style.width = (Math.max(timeLeft, 0) / GAME_SECONDS * 100) + '%';
      if (timeLeft <= 0){
        clearInterval(timer);
        timeUpSequence();
      }
    }, 1000);
  }

  function timeUpSequence(){
    gameEnded = true;
    locked = true;
    overlayTimeup.classList.add('show');
    setTimeout(function(){ endGame(); }, 2500);
  }

  function endGame(){
    overlayTimeup.classList.remove('show');
    screenGame.classList.add('hidden');
    screenResult.classList.remove('hidden');
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-ok').textContent = correctCount;
    document.getElementById('final-ng').textContent = wrongCount;
    var total = correctCount + wrongCount;
    var rate = total > 0 ? Math.round(correctCount / total * 100) : 0;
    document.getElementById('final-rate').textContent = rate + '%';
  }

  btnStart.addEventListener('click', startGame);
  btnRetry.addEventListener('click', startGame);
})();
</script>
</body>
</html>
