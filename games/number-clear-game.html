<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数字消しゲーム - 脳トレゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#EAF4FB;
    --bg-bottom:#D7E9F7;
    --card:#FFFFFF;
    --navy:#1F3A5F;
    --navy-soft:#5C7693;
    --blue:#3B82F6;
    --green:#2BAE66;
    --red:#E74C3C;
    --yellow:#E8B400;
    --chip-bg:#F3F8FD;
    --shadow:0 12px 30px rgba(31,58,95,0.12);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:"M PLUS Rounded 1c", sans-serif;
    background:linear-gradient(160deg,var(--bg-top),var(--bg-bottom));
    color:var(--navy);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  #app{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    width:100%;
    max-width:400px;
    background:var(--card);
    border-radius:32px;
    box-shadow:var(--shadow);
    padding:30px 22px 28px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:10px;
    background:linear-gradient(90deg,var(--blue) 0 33%,var(--green) 33% 66%,var(--yellow) 66% 100%);
  }
  h1{
    font-size:25px;
    font-weight:900;
    margin:6px 0 4px;
  }
  .sub{
    font-size:14px;
    color:var(--navy-soft);
    margin:0 0 20px;
    line-height:1.7;
  }
  .rule-box{
    background:var(--chip-bg);
    border-radius:18px;
    padding:16px 18px;
    margin-bottom:22px;
    text-align:left;
    font-size:14px;
    line-height:1.8;
  }
  .rule-box b{color:var(--blue);}
  .btn{
    border:none;
    border-radius:20px;
    font-family:inherit;
    font-weight:700;
    cursor:pointer;
    transition:transform .08s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-start{
    width:100%;
    padding:20px 0;
    font-size:22px;
    color:#fff;
    background:linear-gradient(135deg,var(--blue),#2563EB);
    box-shadow:0 10px 22px rgba(59,130,246,0.35);
  }
  /* ---- game screen ---- */
  #screen-game{ position:relative; }
  .hud{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:12px;
  }
  .hud-item{ text-align:left; }
  .hud-label{
    font-size:12px;
    color:var(--navy-soft);
    font-weight:700;
  }
  .hud-val{
    font-size:20px;
    font-weight:900;
    line-height:1.2;
  }
  .next-target{
    text-align:right;
  }
  .next-target .hud-val{
    font-size:30px;
    color:var(--blue);
  }
  .timebar-wrap{
    height:10px;
    background:#E7EEF6;
    border-radius:6px;
    overflow:hidden;
    margin-bottom:16px;
  }
  .timebar{
    height:100%;
    background:linear-gradient(90deg,var(--green),var(--yellow));
    width:100%;
    transition:width .25s linear;
  }
  .play-area{
    position:relative;
    width:100%;
    height:340px;
    background:var(--chip-bg);
    border-radius:20px;
    overflow:hidden;
  }
  .num-chip{
    position:absolute;
    width:50px;
    height:50px;
    border-radius:50%;
    background:#fff;
    border:2.5px solid var(--blue);
    color:var(--navy);
    font-size:18px;
    font-weight:900;
    display:flex;
    align-items:center;
    justify-content:center;
    transform:translate(-50%,-50%);
    box-shadow:0 4px 10px rgba(31,58,95,0.12);
    transition:opacity .25s ease, transform .25s ease, background .15s, border-color .15s;
    user-select:none;
  }
  .num-chip.cleared{
    opacity:0;
    transform:translate(-50%,-50%) scale(0.3);
    pointer-events:none;
  }
  .num-chip.wrong{
    border-color:var(--red);
    background:#FDEDEB;
    animation:shake .3s;
  }
  @keyframes shake{
    0%,100%{ transform:translate(-50%,-50%); }
    25%{ transform:translate(calc(-50% - 5px),-50%); }
    75%{ transform:translate(calc(-50% + 5px),-50%); }
  }
  .overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.97);
    border-radius:32px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  .overlay.show{ opacity:1; pointer-events:all; }
  .overlay .ov-title{
    font-size:34px;
    font-weight:900;
    margin-bottom:8px;
  }
  .overlay.clear .ov-title{ color:var(--green); }
  .overlay.timeup .ov-title{ color:var(--navy); }
  .overlay .ov-sub{
    font-size:14px;
    color:var(--navy-soft);
  }
  /* ---- result screen ---- */
  .result-score{
    font-size:54px;
    font-weight:900;
    color:var(--blue);
    margin:6px 0 0;
  }
  .result-label{
    font-size:14px;
    color:var(--navy-soft);
    margin-bottom:20px;
  }
  .stat-row{
    display:flex;
    justify-content:space-around;
    margin-bottom:24px;
  }
  .stat{ text-align:center; }
  .stat .num{ font-size:23px; font-weight:900; }
  .stat .num.ok{ color:var(--green); }
  .stat .num.ng{ color:var(--red); }
  .stat .lab{ font-size:12px; color:var(--navy-soft); margin-top:2px; }
  .hidden{ display:none !important; }
  /* ---- dementia eval ---- */
  .dementia-eval{background:var(--chip-bg);border-radius:18px;padding:14px 16px;margin-bottom:20px;}
  .eval-title{font-size:11px;font-weight:700;color:var(--navy-soft);letter-spacing:.08em;margin-bottom:10px;text-align:center;}
  .eval-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
  .eval-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
  .eval-dot.low{background:var(--green);}
  .eval-dot.mid{background:var(--yellow);}
  .eval-dot.high{background:var(--red);}
  .eval-level{font-size:19px;font-weight:900;}
  .eval-level.low{color:var(--green);}
  .eval-level.mid{color:var(--yellow);}
  .eval-level.high{color:var(--red);}
  .eval-msg{font-size:12px;color:var(--navy);line-height:1.65;text-align:center;margin-bottom:6px;}
  .eval-note{font-size:10px;color:var(--navy-soft);line-height:1.5;text-align:center;}
</style>
</head>
<body>
<div id="app">

  <!-- スタート画面 -->
  <div class="card" id="screen-start">
    <h1>数字消しゲーム</h1>
    <p class="sub">バラバラに散らばった数字を<br>小さい順に見つけてタップ！</p>
    <div class="rule-box">
      <b>1から30</b>までの数字が画面に散らばっています。<br>
      小さい数字から順番にタップして消していきましょう。<br>
      60秒以内に何個消せるかチャレンジ！
    </div>
    <button class="btn btn-start" id="btn-start">スタート</button>
  </div>

  <!-- ゲーム画面 -->
  <div class="card hidden" id="screen-game">
    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">残り時間</div>
        <div class="hud-val"><span id="time-val">60</span>秒</div>
      </div>
      <div class="hud-item next-target">
        <div class="hud-label">次の数字</div>
        <div class="hud-val" id="next-val">1</div>
      </div>
    </div>
    <div class="timebar-wrap"><div class="timebar" id="timebar"></div></div>
    <div class="play-area" id="play-area"></div>

    <div class="overlay clear" id="overlay-clear">
      <div class="ov-title">全部クリア！</div>
      <div class="ov-sub">結果を集計しています…</div>
    </div>
    <div class="overlay timeup" id="overlay-timeup">
      <div class="ov-title">タイムアップ！</div>
      <div class="ov-sub">結果を集計しています…</div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="card hidden" id="screen-result">
    <h1 id="result-title">結果</h1>
    <div class="result-score" id="final-score">0</div>
    <div class="result-label">点</div>
    <div class="stat-row">
      <div class="stat"><div class="num ok" id="final-cleared">0</div><div class="lab">消した数</div></div>
      <div class="stat"><div class="num ng" id="final-miss">0</div><div class="lab">ミス回数</div></div>
      <div class="stat"><div class="num" id="final-time">0秒</div><div class="lab">残り時間</div></div>
    </div>
    <div class="dementia-eval">
      <div class="eval-title">認知症リスク評価（参考）</div>
      <div class="eval-row">
        <div class="eval-dot" id="eval-dot"></div>
        <div class="eval-level" id="eval-level">-</div>
      </div>
      <div class="eval-msg" id="eval-msg"></div>
      <div class="eval-note">※ゲームの成績に基づく参考値です。医療的診断ではありません。</div>
    </div>
    <button class="btn btn-start" id="btn-retry">もう一度プレイ</button>
  </div>

</div>

<script>
(function(){
  var TOTAL_NUM = 30;
  var GAME_SECONDS = 60;
  var COLS = 5, ROWS = 6; // 5*6 = 30 cells

  var screenStart = document.getElementById('screen-start');
  var screenGame = document.getElementById('screen-game');
  var screenResult = document.getElementById('screen-result');

  var playArea = document.getElementById('play-area');
  var timeVal = document.getElementById('time-val');
  var nextVal = document.getElementById('next-val');
  var timebar = document.getElementById('timebar');
  var overlayClear = document.getElementById('overlay-clear');
  var overlayTimeup = document.getElementById('overlay-timeup');

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');

  var timeLeft, timer, nextExpected, missCount, clearedCount, gameEnded, chips;

  function shuffle(arr){
    for (var i = arr.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function layoutChips(){
    playArea.innerHTML = '';
    chips = {};
    var w = playArea.clientWidth;
    var h = playArea.clientHeight;
    var cellW = w / COLS;
    var cellH = h / ROWS;
    var cellIndexes = shuffle([...Array(COLS * ROWS).keys()]);

    for (var n = 1; n <= TOTAL_NUM; n++){
      var idx = cellIndexes[n - 1];
      var col = idx % COLS;
      var row = Math.floor(idx / COLS);
      var jitterX = (Math.random() - 0.5) * (cellW * 0.4);
      var jitterY = (Math.random() - 0.5) * (cellH * 0.4);
      var cx = col * cellW + cellW / 2 + jitterX;
      var cy = row * cellH + cellH / 2 + jitterY;
      cx = Math.max(28, Math.min(w - 28, cx));
      cy = Math.max(28, Math.min(h - 28, cy));

      var chip = document.createElement('div');
      chip.className = 'num-chip';
      chip.textContent = n;
      chip.style.left = cx + 'px';
      chip.style.top = cy + 'px';
      chip.addEventListener('click', (function(num, el){
        return function(){ handleTap(num, el); };
      })(n, chip));
      playArea.appendChild(chip);
      chips[n] = chip;
    }
  }

  function handleTap(num, el){
    if (gameEnded) return;
    if (num === nextExpected){
      el.classList.add('cleared');
      clearedCount++;
      nextExpected++;
      if (clearedCount >= TOTAL_NUM){
        finishGame(true);
      } else {
        nextVal.textContent = nextExpected;
      }
    } else if (!el.classList.contains('cleared')){
      missCount++;
      el.classList.add('wrong');
      setTimeout(function(){ el.classList.remove('wrong'); }, 300);
    }
  }

  function startGame(){
    timeLeft = GAME_SECONDS;
    nextExpected = 1;
    missCount = 0;
    clearedCount = 0;
    gameEnded = false;

    timeVal.textContent = timeLeft;
    nextVal.textContent = nextExpected;
    timebar.style.width = '100%';
    overlayClear.classList.remove('show');
    overlayTimeup.classList.remove('show');

    screenStart.classList.add('hidden');
    screenResult.classList.add('hidden');
    screenGame.classList.remove('hidden');

    // play-areaが表示されてサイズが確定してから配置
    requestAnimationFrame(function(){ layoutChips(); });

    clearInterval(timer);
    timer = setInterval(function(){
      timeLeft -= 1;
      timeVal.textContent = Math.max(timeLeft, 0);
      timebar.style.width = (Math.max(timeLeft, 0) / GAME_SECONDS * 100) + '%';
      if (timeLeft <= 0){
        clearInterval(timer);
        finishGame(false);
      }
    }, 1000);
  }

  function finishGame(allCleared){
    if (gameEnded) return;
    gameEnded = true;
    clearInterval(timer);
    if (allCleared){
      overlayClear.classList.add('show');
    } else {
      overlayTimeup.classList.add('show');
    }
    setTimeout(function(){ showResult(allCleared); }, allCleared ? 1800 : 2500);
  }

  function showResult(allCleared){
    overlayClear.classList.remove('show');
    overlayTimeup.classList.remove('show');
    screenGame.classList.add('hidden');
    screenResult.classList.remove('hidden');

    var remaining = Math.max(timeLeft, 0);
    var score;
    if (allCleared){
      score = TOTAL_NUM * 10 + remaining * 5 - missCount * 3;
    } else {
      score = clearedCount * 10 - missCount * 3;
    }
    score = Math.max(0, score);

    document.getElementById('result-title').textContent = allCleared ? '全部クリア！' : 'タイムアップ';
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-cleared').textContent = clearedCount + '/' + TOTAL_NUM;
    document.getElementById('final-miss').textContent = missCount;
    document.getElementById('final-time').textContent = remaining + '秒';
    var dotEl = document.getElementById('eval-dot');
    var levelEl = document.getElementById('eval-level');
    var msgEl = document.getElementById('eval-msg');
    if (clearedCount >= 20){
      dotEl.className = 'eval-dot low'; levelEl.className = 'eval-level low';
      levelEl.textContent = '認知症リスク 低';
      msgEl.textContent = '探索力・注意力が高い水準です。この調子で脳トレを続けましょう！';
    } else if (clearedCount >= 10){
      dotEl.className = 'eval-dot mid'; levelEl.className = 'eval-level mid';
      levelEl.textContent = '認知症リスク 中';
      msgEl.textContent = '引き続き脳トレを続けて、認知機能を維持しましょう。';
    } else {
      dotEl.className = 'eval-dot high'; levelEl.className = 'eval-level high';
      levelEl.textContent = '認知症リスク 高';
      msgEl.textContent = '積極的に脳トレに取り組みましょう。気になる場合は専門家にご相談ください。';
    }
  }

  btnStart.addEventListener('click', startGame);
  btnRetry.addEventListener('click', startGame);
})();
</script>
</body>
</html>
