<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>しりとりタップ - 脳トレゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#EAF4FB;
    --bg-bottom:#D7E9F7;
    --card:#FFFFFF;
    --navy:#1F3A5F;
    --navy-soft:#5C7693;
    --blue:#3B82F6;
    --green:#2BAE66;
    --red:#E74C3C;
    --yellow:#E8B400;
    --chip-bg:#F3F8FD;
    --shadow:0 12px 30px rgba(31,58,95,0.12);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:"M PLUS Rounded 1c", sans-serif;
    background:linear-gradient(160deg,var(--bg-top),var(--bg-bottom));
    color:var(--navy);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  #app{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    width:100%;
    max-width:400px;
    background:var(--card);
    border-radius:32px;
    box-shadow:var(--shadow);
    padding:30px 22px 28px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:10px;
    background:linear-gradient(90deg,var(--blue) 0 33%,var(--green) 33% 66%,var(--yellow) 66% 100%);
  }
  h1{
    font-size:25px;
    font-weight:900;
    margin:6px 0 4px;
  }
  .sub{
    font-size:14px;
    color:var(--navy-soft);
    margin:0 0 20px;
    line-height:1.7;
  }
  .rule-box{
    background:var(--chip-bg);
    border-radius:18px;
    padding:16px 18px;
    margin-bottom:22px;
    text-align:left;
    font-size:14px;
    line-height:1.8;
  }
  .rule-box b{color:var(--blue);}
  .btn{
    border:none;
    border-radius:20px;
    font-family:inherit;
    font-weight:700;
    cursor:pointer;
    transition:transform .08s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-start{
    width:100%;
    padding:20px 0;
    font-size:22px;
    color:#fff;
    background:linear-gradient(135deg,var(--blue),#2563EB);
    box-shadow:0 10px 22px rgba(59,130,246,0.35);
  }
  /* ---- game screen ---- */
  #screen-game{ position:relative; }
  .hud{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:12px;
  }
  .hud-item{ text-align:left; }
  .hud-item.mid{ text-align:center; }
  .hud-item.right{ text-align:right; }
  .hud-label{
    font-size:12px;
    color:var(--navy-soft);
    font-weight:700;
  }
  .hud-val{
    font-size:20px;
    font-weight:900;
    line-height:1.2;
  }
  .timebar-wrap{
    height:10px;
    background:#E7EEF6;
    border-radius:6px;
    overflow:hidden;
    margin-bottom:18px;
  }
  .timebar{
    height:100%;
    background:linear-gradient(90deg,var(--green),var(--yellow));
    width:100%;
    transition:width .25s linear;
  }
  .current-word-box{
    background:var(--chip-bg);
    border-radius:20px;
    padding:18px 10px;
    margin-bottom:18px;
  }
  .current-word-label{
    font-size:12px;
    color:var(--navy-soft);
    font-weight:700;
    margin-bottom:4px;
  }
  .current-word{
    font-size:34px;
    font-weight:900;
    color:var(--navy);
  }
  .current-word .last-char{
    color:var(--blue);
    text-decoration:underline;
    text-decoration-color:var(--blue);
    text-decoration-thickness:3px;
  }
  .hint-arrow{
    font-size:13px;
    color:var(--navy-soft);
    margin-top:4px;
  }
  .options-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .option-btn{
    padding:20px 6px;
    font-size:20px;
    border-radius:18px;
    background:#fff;
    border:2.5px solid var(--chip-bg);
    color:var(--navy);
    box-shadow:0 4px 10px rgba(31,58,95,0.1);
  }
  .option-btn.wrong{
    border-color:var(--red);
    background:#FDEDEB;
    animation:shake .3s;
  }
  .option-btn.correct{
    border-color:var(--green);
    background:#EAFBF1;
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-4px); }
    75%{ transform:translateX(4px); }
  }
  .overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.97);
    border-radius:32px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  .overlay.show{ opacity:1; pointer-events:all; }
  .overlay .ov-title{
    font-size:34px;
    font-weight:900;
    color:var(--navy);
    margin-bottom:8px;
  }
  .overlay .ov-sub{
    font-size:14px;
    color:var(--navy-soft);
  }
  /* ---- result screen ---- */
  .result-score{
    font-size:54px;
    font-weight:900;
    color:var(--blue);
    margin:6px 0 0;
  }
  .result-label{
    font-size:14px;
    color:var(--navy-soft);
    margin-bottom:20px;
  }
  .stat-row{
    display:flex;
    justify-content:space-around;
    margin-bottom:24px;
  }
  .stat{ text-align:center; }
  .stat .num{ font-size:23px; font-weight:900; }
  .stat .num.ok{ color:var(--green); }
  .stat .num.ng{ color:var(--red); }
  .stat .lab{ font-size:12px; color:var(--navy-soft); margin-top:2px; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="app">

  <!-- スタート画面 -->
  <div class="card" id="screen-start">
    <h1>しりとりタップ</h1>
    <p class="sub">表示された言葉の最後の文字から<br>始まる言葉をタップ！</p>
    <div class="rule-box">
      例えば「ねこ」なら、最後の文字は<b>「こ」</b>。<br>
      「こ」から始まる言葉を4つの中から選んでタップ。<br>
      正解するとどんどん言葉がつながっていきます。<br>
      45秒間で連続正解を目指そう！
    </div>
    <button class="btn btn-start" id="btn-start">スタート</button>
  </div>

  <!-- ゲーム画面 -->
  <div class="card hidden" id="screen-game">
    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">残り時間</div>
        <div class="hud-val"><span id="time-val">45</span>秒</div>
      </div>
      <div class="hud-item mid">
        <div class="hud-label">連続</div>
        <div class="hud-val"><span id="combo-val">0</span></div>
      </div>
      <div class="hud-item right">
        <div class="hud-label">得点</div>
        <div class="hud-val" id="score-val">0</div>
      </div>
    </div>
    <div class="timebar-wrap"><div class="timebar" id="timebar"></div></div>

    <div class="current-word-box">
      <div class="current-word-label">今の言葉</div>
      <div class="current-word" id="current-word">ねこ</div>
      <div class="hint-arrow">↓ この文字から始まる言葉は？</div>
    </div>

    <div class="options-grid" id="options-grid"></div>

    <div class="overlay" id="overlay-timeup">
      <div class="ov-title">タイムアップ！</div>
      <div class="ov-sub">結果を集計しています…</div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="card hidden" id="screen-result">
    <h1>タイムアップ！</h1>
    <div class="result-score" id="final-score">0</div>
    <div class="result-label">点</div>
    <div class="stat-row">
      <div class="stat"><div class="num ok" id="final-ok">0</div><div class="lab">正解</div></div>
      <div class="stat"><div class="num ng" id="final-ng">0</div><div class="lab">間違い</div></div>
      <div class="stat"><div class="num" id="final-combo">0</div><div class="lab">最大連続</div></div>
    </div>
    <button class="btn btn-start" id="btn-retry">もう一度プレイ</button>
  </div>

</div>

<script>
(function(){
  // 「ん」で終わらない言葉だけのプール（しりとりが途切れないように調整済み）
  var WORD_POOL = [
    "ねこ","こあら","らっぱ","ぱんだ","だるま","まくら","らじお","おにぎり","りんご","だんご",
    "ごま","まめ","めだか","かめ","めがね","ねずみ","みそ","そら","らっこ","こおり",
    "りす","すいか","かさ","さくら","らくだ","だいず","ずつう","うさぎ","ぎんが","がっこう","うま"
  ];
  var GAME_SECONDS = 45;

  var screenStart = document.getElementById('screen-start');
  var screenGame = document.getElementById('screen-game');
  var screenResult = document.getElementById('screen-result');

  var currentWordEl = document.getElementById('current-word');
  var optionsGrid = document.getElementById('options-grid');
  var timeVal = document.getElementById('time-val');
  var scoreVal = document.getElementById('score-val');
  var comboVal = document.getElementById('combo-val');
  var timebar = document.getElementById('timebar');
  var overlayTimeup = document.getElementById('overlay-timeup');

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');

  var timeLeft, timer, score, correctCount, wrongCount, combo, maxCombo;
  var currentWord, recentUsed, gameEnded, locked;

  function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
  function shuffle(arr){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function lastChar(w){ return w.slice(-1); }

  function getCandidates(requiredChar, excludeSet){
    return WORD_POOL.filter(function(w){
      return w[0] === requiredChar && !excludeSet.has(w);
    });
  }

  function renderRound(){
    if (gameEnded) return;
    locked = false;
    var required = lastChar(currentWord);

    currentWordEl.innerHTML = currentWord.slice(0, -1) +
      '<span class="last-char">' + required + '</span>';

    var excludeSet = new Set(recentUsed.concat([currentWord]));
    var candidates = getCandidates(required, excludeSet);
    if (candidates.length === 0){
      candidates = getCandidates(required, new Set([currentWord]));
    }
    if (candidates.length === 0){
      candidates = getCandidates(required, new Set());
    }
    var correctWord = pick(candidates);

    var distractorPool = WORD_POOL.filter(function(w){
      return w[0] !== required && w !== correctWord;
    });
    var distractors = shuffle(distractorPool).slice(0, 3);
    var options = shuffle([correctWord].concat(distractors));

    optionsGrid.innerHTML = '';
    options.forEach(function(word){
      var btn = document.createElement('button');
      btn.className = 'btn option-btn';
      btn.textContent = word;
      btn.addEventListener('click', function(){ handleAnswer(word, correctWord, btn); });
      optionsGrid.appendChild(btn);
    });
  }

  function handleAnswer(chosen, correctWord, btnEl){
    if (gameEnded || locked) return;
    if (chosen === correctWord){
      locked = true;
      btnEl.classList.add('correct');
      score += 1; correctCount += 1; combo += 1;
      if (combo > maxCombo) maxCombo = combo;
      scoreVal.textContent = score;
      comboVal.textContent = combo;

      recentUsed.push(currentWord);
      if (recentUsed.length > 5) recentUsed.shift();
      currentWord = correctWord;

      setTimeout(function(){ renderRound(); }, 350);
    } else {
      score = Math.max(0, score - 1); wrongCount += 1; combo = 0;
      scoreVal.textContent = score;
      comboVal.textContent = combo;
      btnEl.classList.add('wrong');
      setTimeout(function(){ btnEl.classList.remove('wrong'); }, 300);
    }
  }

  function startGame(){
    timeLeft = GAME_SECONDS;
    score = 0; correctCount = 0; wrongCount = 0; combo = 0; maxCombo = 0;
    gameEnded = false; locked = false;
    recentUsed = [];
    currentWord = pick(WORD_POOL);

    timeVal.textContent = timeLeft;
    scoreVal.textContent = score;
    comboVal.textContent = combo;
    timebar.style.width = '100%';
    overlayTimeup.classList.remove('show');

    screenStart.classList.add('hidden');
    screenResult.classList.add('hidden');
    screenGame.classList.remove('hidden');

    renderRound();

    clearInterval(timer);
    timer = setInterval(function(){
      timeLeft -= 1;
      timeVal.textContent = Math.max(timeLeft, 0);
      timebar.style.width = (Math.max(timeLeft, 0) / GAME_SECONDS * 100) + '%';
      if (timeLeft <= 0){
        clearInterval(timer);
        timeUpSequence();
      }
    }, 1000);
  }

  function timeUpSequence(){
    gameEnded = true;
    locked = true;
    overlayTimeup.classList.add('show');
    setTimeout(function(){ endGame(); }, 2500);
  }

  function endGame(){
    overlayTimeup.classList.remove('show');
    screenGame.classList.add('hidden');
    screenResult.classList.remove('hidden');
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-ok').textContent = correctCount;
    document.getElementById('final-ng').textContent = wrongCount;
    document.getElementById('final-combo').textContent = maxCombo;
  }

  btnStart.addEventListener('click', startGame);
  btnRetry.addEventListener('click', startGame);
})();
</script>
</body>
</html>
