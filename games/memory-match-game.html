<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>記憶めくりカード - 脳トレゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#EAF4FB;
    --bg-bottom:#D7E9F7;
    --card:#FFFFFF;
    --navy:#1F3A5F;
    --navy-soft:#5C7693;
    --blue:#3B82F6;
    --green:#2BAE66;
    --red:#E74C3C;
    --yellow:#E8B400;
    --chip-bg:#F3F8FD;
    --shadow:0 12px 30px rgba(31,58,95,0.12);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:"M PLUS Rounded 1c", sans-serif;
    background:linear-gradient(160deg,var(--bg-top),var(--bg-bottom));
    color:var(--navy);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  #app{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    width:100%;
    max-width:400px;
    background:var(--card);
    border-radius:32px;
    box-shadow:var(--shadow);
    padding:30px 22px 28px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:10px;
    background:linear-gradient(90deg,var(--blue) 0 33%,var(--green) 33% 66%,var(--yellow) 66% 100%);
  }
  h1{
    font-size:25px;
    font-weight:900;
    margin:6px 0 4px;
  }
  .sub{
    font-size:14px;
    color:var(--navy-soft);
    margin:0 0 20px;
    line-height:1.7;
  }
  .rule-box{
    background:var(--chip-bg);
    border-radius:18px;
    padding:16px 18px;
    margin-bottom:22px;
    text-align:left;
    font-size:14px;
    line-height:1.8;
  }
  .rule-box b{color:var(--blue);}
  .btn{
    border:none;
    border-radius:20px;
    font-family:inherit;
    font-weight:700;
    cursor:pointer;
    transition:transform .08s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-start{
    width:100%;
    padding:20px 0;
    font-size:22px;
    color:#fff;
    background:linear-gradient(135deg,var(--blue),#2563EB);
    box-shadow:0 10px 22px rgba(59,130,246,0.35);
  }
  /* ---- game screen ---- */
  #screen-game{ position:relative; }
  .hud{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:12px;
  }
  .hud-item{ text-align:left; }
  .hud-item.right{ text-align:right; }
  .hud-label{
    font-size:12px;
    color:var(--navy-soft);
    font-weight:700;
  }
  .hud-val{
    font-size:20px;
    font-weight:900;
    line-height:1.2;
  }
  .timebar-wrap{
    height:10px;
    background:#E7EEF6;
    border-radius:6px;
    overflow:hidden;
    margin-bottom:16px;
  }
  .timebar{
    height:100%;
    background:linear-gradient(90deg,var(--green),var(--yellow));
    width:100%;
    transition:width .25s linear;
  }
  .board{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:8px;
  }
  .mem-card{
    aspect-ratio:1/1;
    perspective:600px;
  }
  .mem-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform .35s;
    transform-style:preserve-3d;
  }
  .mem-card.flipped .mem-inner,
  .mem-card.matched .mem-inner{
    transform:rotateY(180deg);
  }
  .mem-face{
    position:absolute;
    inset:0;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    backface-visibility:hidden;
  }
  .mem-back{
    background:linear-gradient(135deg,var(--blue),#2563EB);
    color:#fff;
    font-size:22px;
    font-weight:900;
    box-shadow:0 3px 8px rgba(31,58,95,0.15);
  }
  .mem-front{
    background:#fff;
    border:2.5px solid var(--chip-bg);
    font-size:28px;
    transform:rotateY(180deg);
  }
  .mem-card.matched .mem-front{
    border-color:var(--green);
    background:#EAFBF1;
  }
  .mem-card.wrong .mem-back{
    background:linear-gradient(135deg,#F0685A,var(--red));
  }
  .overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.97);
    border-radius:32px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  .overlay.show{ opacity:1; pointer-events:all; }
  .overlay .ov-title{
    font-size:34px;
    font-weight:900;
    margin-bottom:8px;
  }
  .overlay.clear .ov-title{ color:var(--green); }
  .overlay.timeup .ov-title{ color:var(--navy); }
  .overlay .ov-sub{
    font-size:14px;
    color:var(--navy-soft);
  }
  /* ---- result screen ---- */
  .result-score{
    font-size:54px;
    font-weight:900;
    color:var(--blue);
    margin:6px 0 0;
  }
  .result-label{
    font-size:14px;
    color:var(--navy-soft);
    margin-bottom:20px;
  }
  .stat-row{
    display:flex;
    justify-content:space-around;
    margin-bottom:24px;
  }
  .stat{ text-align:center; }
  .stat .num{ font-size:23px; font-weight:900; }
  .stat .num.ok{ color:var(--green); }
  .stat .num.ng{ color:var(--red); }
  .stat .lab{ font-size:12px; color:var(--navy-soft); margin-top:2px; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="app">

  <!-- スタート画面 -->
  <div class="card" id="screen-start">
    <h1>記憶めくりカード</h1>
    <p class="sub">同じ絵柄のペアを覚えて<br>見つけ出そう！</p>
    <div class="rule-box">
      カードを2枚めくって、<b>同じ絵柄</b>のペアを<br>
      見つけてください。<br>
      外れたカードは元に戻ります。<br>
      90秒以内に全8ペアを見つけられるかな？
    </div>
    <button class="btn btn-start" id="btn-start">スタート</button>
  </div>

  <!-- ゲーム画面 -->
  <div class="card hidden" id="screen-game">
    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">残り時間</div>
        <div class="hud-val"><span id="time-val">90</span>秒</div>
      </div>
      <div class="hud-item right">
        <div class="hud-label">見つけたペア</div>
        <div class="hud-val"><span id="pair-val">0</span> / 8</div>
      </div>
    </div>
    <div class="timebar-wrap"><div class="timebar" id="timebar"></div></div>
    <div class="board" id="board"></div>

    <div class="overlay clear" id="overlay-clear">
      <div class="ov-title">全部クリア！</div>
      <div class="ov-sub">結果を集計しています…</div>
    </div>
    <div class="overlay timeup" id="overlay-timeup">
      <div class="ov-title">タイムアップ！</div>
      <div class="ov-sub">結果を集計しています…</div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="card hidden" id="screen-result">
    <h1 id="result-title">結果</h1>
    <div class="result-score" id="final-score">0</div>
    <div class="result-label">点</div>
    <div class="stat-row">
      <div class="stat"><div class="num ok" id="final-pairs">0</div><div class="lab">見つけたペア</div></div>
      <div class="stat"><div class="num ng" id="final-miss">0</div><div class="lab">ミス回数</div></div>
      <div class="stat"><div class="num" id="final-time">0秒</div><div class="lab">残り時間</div></div>
    </div>
    <button class="btn btn-start" id="btn-retry">もう一度プレイ</button>
  </div>

</div>

<script>
(function(){
  var SYMBOLS = ["🍎","🍌","🍇","🍒","🍊","🍑","🍉","🍓"]; // 8種類×2枚=16枚
  var GAME_SECONDS = 90;

  var screenStart = document.getElementById('screen-start');
  var screenGame = document.getElementById('screen-game');
  var screenResult = document.getElementById('screen-result');

  var board = document.getElementById('board');
  var timeVal = document.getElementById('time-val');
  var pairVal = document.getElementById('pair-val');
  var timebar = document.getElementById('timebar');
  var overlayClear = document.getElementById('overlay-clear');
  var overlayTimeup = document.getElementById('overlay-timeup');

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');

  var timeLeft, timer, matchedPairs, missCount, gameEnded, lockBoard, flippedCards;

  function shuffle(arr){
    for (var i = arr.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function buildBoard(){
    board.innerHTML = '';
    var deck = shuffle(SYMBOLS.concat(SYMBOLS));
    deck.forEach(function(symbol, i){
      var cardEl = document.createElement('div');
      cardEl.className = 'mem-card';
      cardEl.dataset.symbol = symbol;
      cardEl.dataset.id = i;

      var inner = document.createElement('div');
      inner.className = 'mem-inner';

      var back = document.createElement('div');
      back.className = 'mem-face mem-back';
      back.textContent = '?';

      var front = document.createElement('div');
      front.className = 'mem-face mem-front';
      front.textContent = symbol;

      inner.appendChild(back);
      inner.appendChild(front);
      cardEl.appendChild(inner);
      cardEl.addEventListener('click', function(){ handleCardClick(cardEl); });
      board.appendChild(cardEl);
    });
  }

  function handleCardClick(cardEl){
    if (gameEnded || lockBoard) return;
    if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;

    cardEl.classList.add('flipped');
    flippedCards.push(cardEl);

    if (flippedCards.length === 2){
      lockBoard = true;
      var a = flippedCards[0], b = flippedCards[1];
      if (a.dataset.symbol === b.dataset.symbol){
        a.classList.add('matched');
        b.classList.add('matched');
        matchedPairs++;
        pairVal.textContent = matchedPairs;
        flippedCards = [];
        lockBoard = false;
        if (matchedPairs >= SYMBOLS.length){
          finishGame(true);
        }
      } else {
        missCount++;
        a.classList.add('wrong');
        b.classList.add('wrong');
        setTimeout(function(){
          a.classList.remove('flipped', 'wrong');
          b.classList.remove('flipped', 'wrong');
          flippedCards = [];
          lockBoard = false;
        }, 700);
      }
    }
  }

  function startGame(){
    timeLeft = GAME_SECONDS;
    matchedPairs = 0;
    missCount = 0;
    gameEnded = false;
    lockBoard = false;
    flippedCards = [];

    timeVal.textContent = timeLeft;
    pairVal.textContent = matchedPairs;
    timebar.style.width = '100%';
    overlayClear.classList.remove('show');
    overlayTimeup.classList.remove('show');

    screenStart.classList.add('hidden');
    screenResult.classList.add('hidden');
    screenGame.classList.remove('hidden');

    buildBoard();

    clearInterval(timer);
    timer = setInterval(function(){
      timeLeft -= 1;
      timeVal.textContent = Math.max(timeLeft, 0);
      timebar.style.width = (Math.max(timeLeft, 0) / GAME_SECONDS * 100) + '%';
      if (timeLeft <= 0){
        clearInterval(timer);
        finishGame(false);
      }
    }, 1000);
  }

  function finishGame(allCleared){
    if (gameEnded) return;
    gameEnded = true;
    lockBoard = true;
    clearInterval(timer);
    if (allCleared){
      overlayClear.classList.add('show');
    } else {
      overlayTimeup.classList.add('show');
    }
    setTimeout(function(){ showResult(allCleared); }, allCleared ? 1800 : 2500);
  }

  function showResult(allCleared){
    overlayClear.classList.remove('show');
    overlayTimeup.classList.remove('show');
    screenGame.classList.add('hidden');
    screenResult.classList.remove('hidden');

    var remaining = Math.max(timeLeft, 0);
    var score;
    if (allCleared){
      score = SYMBOLS.length * 15 + remaining * 4 - missCount * 3;
    } else {
      score = matchedPairs * 15 - missCount * 3;
    }
    score = Math.max(0, score);

    document.getElementById('result-title').textContent = allCleared ? '全部クリア！' : 'タイムアップ';
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-pairs').textContent = matchedPairs + '/' + SYMBOLS.length;
    document.getElementById('final-miss').textContent = missCount;
    document.getElementById('final-time').textContent = remaining + '秒';
  }

  btnStart.addEventListener('click', startGame);
  btnRetry.addEventListener('click', startGame);
})();
</script>
</body>
</html>
